<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Baccarat — Big Road</title>
  <meta name="description" content="Live Bitcoin price baccarat scoreboard. Every 10 seconds, Bitcoin's price direction determines a Player or Banker result, displayed as a classic Big Road." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: #0e1018;
      --surface2: #161824;
      --border: #252836;
      --gold: #c9a84c;
      --gold-dim: #7a6330;
      --player: #3b82f6;
      --player-bg: #1e3a5f;
      --banker: #ef4444;
      --banker-bg: #5f1e1e;
      --text: #e8eaf0;
      --text-dim: #6b7280;
      --cell: 42px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 1200px;
      padding: 28px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--gold) 0%, #f5d98a 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 130px;
    }

    .stat-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .stat-value.price { color: var(--gold); }
    .stat-value.player { color: var(--player); }
    .stat-value.banker { color: var(--banker); }
    .stat-value.neutral { color: var(--text); }

    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .status-text {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── Big Road Board ── */
    .board-wrapper {
      width: 100%;
      max-width: 1200px;
      padding: 24px;
      flex: 1;
    }

    .board-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .board-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
      font-weight: 600;
    }

    .legend {
      display: flex;
      gap: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .legend-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
    }

    .legend-circle.player {
      background: var(--player-bg);
      border: 2px solid var(--player);
      color: var(--player);
    }

    .legend-circle.banker {
      background: var(--banker-bg);
      border: 2px solid var(--banker);
      color: var(--banker);
    }

    .board-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
    }

    .board-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .board-scroll::-webkit-scrollbar-track {
      background: var(--surface);
    }
    .board-scroll::-webkit-scrollbar-thumb {
      background: var(--gold-dim);
      border-radius: 2px;
    }

    .board {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: inline-grid;
      grid-template-rows: repeat(6, var(--cell));
      gap: 2px;
      min-width: 100%;
    }

    /* Each cell is positioned absolutely within a grid column */

    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      position: relative;
      transition: transform 0.15s ease;
    }

    .cell.empty {
      background: transparent;
    }

    .cell.player {
      background: var(--player-bg);
      border: 2px solid var(--player);
      color: var(--player);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.15);
    }

    .cell.banker {
      background: var(--banker-bg);
      border: 2px solid var(--banker);
      color: var(--banker);
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.15);
    }

    .cell.new-entry {
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .circle-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 800;
    }

    /* ── Footer ── */
    footer {
      padding: 16px 24px;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Loading state ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-dim);
      font-size: 0.9rem;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>₿ BTC Baccarat</h1>
    <span class="subtitle">Big Road</span>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-label">Bitcoin Price</span>
      <span class="stat-value price" id="btc-price">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Player Wins ○</span>
      <span class="stat-value player" id="player-count">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Banker Wins ×</span>
      <span class="stat-value banker" id="banker-count">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Total Rounds</span>
      <span class="stat-value neutral" id="total-count">0</span>
    </div>
    <div class="stat-card" style="margin-left: auto;">
      <span class="stat-label">Status</span>
      <span class="stat-value neutral" style="font-size: 0.85rem;">
        <span class="live-dot"></span>
        <span id="status-text">Connecting…</span>
      </span>
    </div>
    <div class="stat-card" id="clock-card">
      <span class="stat-label">Time</span>
      <span id="clock-display" style="font-size:1.15rem; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:0.05em; color:var(--text); transition: color 0.1s, text-shadow 0.1s;">--:--:--</span>
    </div>
  </div>
</header>

<div class="board-wrapper">
  <div class="board-header">
    <span class="board-title">大路 · Big Road</span>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-circle player">P</div>
        <span>Player (price ↑)</span>
      </div>
      <div class="legend-item">
        <div class="legend-circle banker">B</div>
        <span>Banker (price ↓)</span>
      </div>
    </div>
  </div>

  <div class="board-scroll">
    <div class="board" id="board">
      <div class="loading">
        <div class="spinner"></div>
        Loading scoreboard…
      </div>
    </div>
  </div>
</div>

<footer>
  Bitcoin price sampled every ~10 seconds via CoinGecko · Up = Player · Down = Banker · Last updated: <span id="last-updated">—</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://nldtvjmdyasbmuzebpbd.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZHR2am1keWFzYm11emVicGJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTUxNTcsImV4cCI6MjA5MDQ3MTE1N30.WF7ZI7THiw-jFsDzVN2rnY1mMw4F0kDJRB5CnAQy1w0'
  const MAX_ROWS = 6

  // ── Init ─────────────────────────────────────────────────────────────────
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let rounds = []

  // ── Big Road Algorithm ───────────────────────────────────────────────────
  // Builds a coordinate map: cells["col,row"] = { outcome, isTail, streakId }
  // Dragon tail rules:
  //   - When a column fills (row 5) and same outcome continues → go RIGHT
  //   - If the row ABOVE the target cell is occupied → DROP DOWN one row (Strategy 1)
  //   - Same-color adjacent tails get an extra right-shift (Strategy 2)
  //   - Visual separator line marks where each tail begins (Strategy 4)
  function buildBigRoad(rounds, maxRows = 6) {
    const cells = {}
    const has  = (c, r) => !!(cells[`${c},${r}`])
    const get  = (c, r) => cells[`${c},${r}`] || null
    const put  = (c, r, d) => { cells[`${c},${r}`] = d }

    let col = 0, row = 0, maxCol = 0
    let prevOutcome = null
    let inTail = false
    let tailRow = 0      // which row the current tail runs along
    let streakId = 0

    for (let i = 0; i < rounds.length; i++) {
      const { outcome } = rounds[i]

      if (prevOutcome === null) {
        put(0, 0, { outcome, streakId })
        col = 0; row = 0; maxCol = 0

      } else if (outcome === prevOutcome) {
        if (!inTail && row < maxRows - 1) {
          // Normal downward fill
          row++
          put(col, row, { outcome, streakId })

        } else {
          // Dragon tail — extend to the right
          if (!inTail) {
            inTail = true
            tailRow = row
          }

          const nc = col + 1
          let nr = tailRow

          // Strategy 1: if the cell directly above our target is occupied, drop down
          while (nr > 0 && has(nc, nr - 1)) {
            nr++
            if (nr >= maxRows) { nr = maxRows - 1; break }
          }

          // Strategy 2: same-color tail immediately above → skip one extra column right
          // (detect: the previous streak's tail occupies (nc, nr) already)
          if (has(nc, nr) && get(nc, nr).outcome === outcome) {
            // Try one more column over
            const nc2 = nc + 1
            let nr2 = tailRow
            while (nr2 > 0 && has(nc2, nr2 - 1)) {
              nr2++
              if (nr2 >= maxRows) { nr2 = maxRows - 1; break }
            }
            col = nc2; row = nr2; tailRow = nr2
          } else {
            col = nc; row = nr; tailRow = nr
          }

          maxCol = Math.max(maxCol, col)
          const isFirstTailCell = (col === (maxCol) && !has(col - 1, row))
          put(col, row, { outcome, streakId, isTail: true, tailStart: (row !== tailRow || col === maxCol) })
        }

      } else {
        // New streak — new column
        streakId++
        inTail = false
        col = maxCol + 1
        row = 0
        maxCol = col
        put(col, row, { outcome, streakId })
      }

      prevOutcome = outcome
    }

    return { cells, maxCol }
  }

  // ── Rendering ─────────────────────────────────────────────────────────────
  function renderBoard(rounds) {
    const board = document.getElementById('board')

    if (rounds.length === 0) {
      board.style.display = 'flex'
      board.innerHTML = `<div class="loading" style="color:var(--text-dim)">Waiting for first Bitcoin price sample…</div>`
      return
    }

    const { cells, maxCol } = buildBigRoad(rounds, MAX_ROWS)
    const numCols = Math.max(maxCol + 8, 24) // padding so board doesn't look cramped

    // Switch board to CSS Grid
    board.style.display = 'grid'
    board.style.gridTemplateRows = `repeat(${MAX_ROWS}, var(--cell))`
    board.style.gridTemplateColumns = `repeat(${numCols}, var(--cell))`
    board.style.gap = '2px'
    board.style.padding = '12px'
    board.innerHTML = ''

    let newestId = null
    for (const key of Object.keys(cells)) newestId = key // last key inserted = newest

    for (let r = 0; r < MAX_ROWS; r++) {
      for (let c = 0; c < numCols; c++) {
        const div = document.createElement('div')
        const cell = cells[`${c},${r}`]
        const isNewest = cell && `${c},${r}` === newestId

        if (cell) {
          const label = cell.outcome === 'player' ? 'P' : 'B'
          div.className = `cell ${cell.outcome}${isNewest ? ' new-entry' : ''}`

          // Dragon tail marker: thin left-border line inside the circle
          const tailLine = cell.isTail
            ? `<div style="position:absolute;left:4px;top:50%;transform:translateY(-50%);width:2px;height:60%;background:currentColor;opacity:0.5;border-radius:1px;"></div>`
            : ''

          div.style.position = 'relative'
          div.innerHTML = `${tailLine}<div class="circle-inner">${label}</div>`
          div.title = `${cell.outcome === 'player' ? 'Player ↑' : 'Banker ↓'}${cell.isTail ? ' [tail]' : ''}`
        } else {
          div.className = 'cell empty'
        }
        board.appendChild(div)
      }
    }

    // Scroll to show latest column
    const scroll = board.closest('.board-scroll')
    if (scroll) requestAnimationFrame(() => { scroll.scrollLeft = scroll.scrollWidth })
  }

  function updateStats(rounds) {
    const playerCount = rounds.filter(r => r.outcome === 'player').length
    const bankerCount = rounds.filter(r => r.outcome === 'banker').length
    const latest = rounds[rounds.length - 1]

    document.getElementById('player-count').textContent = playerCount
    document.getElementById('banker-count').textContent = bankerCount
    document.getElementById('total-count').textContent = rounds.length

    if (latest) {
      const price = parseFloat(latest.price_usd)
      document.getElementById('btc-price').textContent =
        '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    }

    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString()
    document.getElementById('status-text').textContent = 'Live'
  }

  // ── Live refresh — polls DB every 10 seconds, full authoritative replace ──
  // No WebSocket / real-time channel — structurally impossible to double-count.
  async function refresh() {
    try {
      const { data, error } = await db
        .from('btc_rounds')
        .select('*')
        .order('id', { ascending: true })

      if (error) throw error
      if (!data) return

      const isNew = data.length > rounds.length
      rounds = data // full replace — always authoritative

      if (isNew || rounds.length === 0) {
        renderBoard(rounds)
        updateStats(rounds)
      }

      document.getElementById('status-text').textContent = 'Live'
    } catch (err) {
      console.error('Refresh error:', err.message)
      document.getElementById('status-text').textContent = 'Error'
    }
  }

  // ── Smart polling: burst-poll right after each :x6 tick mark ────────────
  // Worker inserts at :x6.500-:x6.800. We poll at :x7 and :x8 to catch it
  // within 1-2 seconds. A 30s fallback covers any missed real-time updates.
  function msUntilPollFire() {
    const now = new Date()
    const posInCycle = (now.getSeconds() * 1000 + now.getMilliseconds()) % 10_000
    const target = 7_000  // :x7:000 — 1 second after the :x6 tick
    let delay = target - posInCycle
    if (delay <= 0) delay += 10_000
    return delay
  }

  function scheduleNextPoll() {
    const delay = msUntilPollFire()
    setTimeout(async () => {
      await refresh()               // poll at :x7:000
      setTimeout(refresh, 1000)     // poll again at :x8:000 (backup)
      scheduleNextPoll()            // schedule the next :x7 poll
    }, delay)
  }

  // ── Live clock — flashes gold at :x6 second marks ────────────────────────
  function updateClock() {
    const now = new Date()
    const h  = String(now.getHours()).padStart(2, '0')
    const m  = String(now.getMinutes()).padStart(2, '0')
    const s  = String(now.getSeconds()).padStart(2, '0')
    const ms = now.getMilliseconds()
    const isTick = now.getSeconds() % 10 === 6 && ms < 800

    const el = document.getElementById('clock-display')
    el.textContent = `${h}:${m}:${s}`
    if (isTick) {
      el.style.color      = 'var(--gold)'
      el.style.textShadow = '0 0 14px rgba(201,168,76,0.9)'
    } else {
      el.style.color      = 'var(--text)'
      el.style.textShadow = 'none'
    }
  }

  setInterval(updateClock, 100)
  updateClock()

  // ── Boot ─────────────────────────────────────────────────────────────────
  ;(async () => {
    await refresh()                       // initial load
    scheduleNextPoll()                    // aligned polls at :x7 + :x8
    setInterval(refresh, 30_000)          // 30s fallback for resilience
  })()
</script>
</body>
</html>
